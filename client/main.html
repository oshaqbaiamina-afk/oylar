<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сауалнамалар — Oylar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --indigo:#4F46E5;--indigo-d:#3730A3;--indigo-l:#EEF2FF;--indigo-xl:#E0E7FF;
  --amber:#F59E0B;--amber-l:#FFFBEB;--amber-d:#92400E;
  --rose:#F43F5E;--rose-l:#FFF1F2;--rose-d:#9F1239;
  --sky:#0EA5E9;--sky-l:#F0F9FF;
  --green:#10B981;--green-l:#ECFDF5;--green-d:#047857;
  --slate:#0F172A;--slate-700:#334155;--slate-600:#475569;--slate-400:#94A3B8;
  --slate-300:#CBD5E1;--slate-200:#E2E8F0;--slate-100:#F1F5F9;--slate-50:#F8FAFC;
  --white:#fff;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 20px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --radius:12px;--radius-lg:20px;--radius-xl:28px;
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--slate-50);color:var(--slate);min-height:100vh;display:flex;flex-direction:column}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .18s;white-space:nowrap;text-decoration:none}
.btn-sm{padding:7px 16px;font-size:13px;border-radius:8px}
.btn-primary{background:var(--indigo);color:white;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.btn-primary:hover{background:var(--indigo-d);transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,.4)}
.btn-ghost{background:transparent;color:var(--slate-600);border:1.5px solid var(--slate-300)}
.btn-ghost:hover{background:var(--slate-100);border-color:var(--slate-400)}
.btn-white{background:white;color:var(--indigo);box-shadow:var(--shadow)}
.btn-white:hover{background:var(--indigo-l);transform:translateY(-1px)}

/* ─── NAVBAR ─── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:68px;background:rgba(255,255,255,.95);border-bottom:1px solid var(--slate-200);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(0,0,0,.04)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-mark{width:38px;height:38px;background:var(--indigo);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.brand-mark svg{width:20px;height:20px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round}
.brand-name{font-size:20px;font-weight:800;color:var(--slate);letter-spacing:-.5px}
.brand-name em{color:var(--indigo);font-style:normal}
.nav-right{display:flex;gap:8px;align-items:center}
.nav-user-chip{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:10px;background:var(--slate-50);border:1.5px solid var(--slate-100);cursor:pointer;transition:all .15s;text-decoration:none}
.nav-user-chip:hover{background:var(--slate-100);border-color:var(--slate-200)}
.nav-username{font-size:13px;font-weight:600;color:var(--slate-600)}

/* ─── HERO HEADER ─── */
.hero-header{background:var(--white);border-bottom:1px solid var(--slate-200);padding:3rem 2.5rem;position:relative;overflow:hidden}
.hero-header::before{content:'';position:absolute;top:-100px;right:-50px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(79,70,229,.06) 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;position:relative;z-index:1}
.hero-label{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--indigo);text-transform:uppercase;margin-bottom:.8rem}
.hero-title{font-size:42px;font-weight:800;letter-spacing:-1.2px;color:var(--slate);margin-bottom:.8rem;line-height:1.15}
.hero-sub{font-size:17px;color:var(--slate-600);line-height:1.7;max-width:500px}
.hero-stats{display:flex;gap:2.5rem}
.hstat{text-align:center}
.hstat-n{font-size:28px;font-weight:800;color:var(--indigo);letter-spacing:-1px}
.hstat-l{font-size:13px;color:var(--slate-500);font-weight:500;margin-top:2px}

/* ─── SEARCH + FILTERS ─── */
.search-section{background:var(--white);border-bottom:1px solid var(--slate-200);padding:1.2rem 2.5rem;position:sticky;top:68px;z-index:90}
.search-inner{max-width:1100px;margin:0 auto;display:flex;gap:12px;align-items:center}
.search-wrap{flex:1;position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--slate-400);pointer-events:none}
.search-input{width:100%;padding:10px 14px 10px 42px;border:1.5px solid var(--slate-200);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:all .15s;background:var(--slate-50);color:var(--slate)}
.search-input:focus{border-color:var(--indigo);background:var(--white);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.search-input::placeholder{color:var(--slate-400)}

.filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.filter-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--slate-200);background:var(--white);color:var(--slate-600);transition:all .15s;white-space:nowrap}
.filter-tab:hover{border-color:var(--indigo);color:var(--indigo);background:var(--indigo-l)}
.filter-tab.active{background:var(--indigo);color:white;border-color:var(--indigo);box-shadow:0 2px 8px rgba(79,70,229,.25)}

/* ─── MAIN CONTENT ─── */
.main-content{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:2rem 2.5rem}

/* ─── RESULTS ROW ─── */
.results-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.results-count{font-size:14px;color:var(--slate-600);font-weight:500}
.results-count strong{color:var(--slate);font-weight:700}
.sort-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--slate-600)}
.sort-select{padding:6px 12px;border:1.5px solid var(--slate-200);border-radius:8px;font-size:13px;font-family:inherit;color:var(--slate-600);outline:none;cursor:pointer;background:var(--white)}
.sort-select:focus{border-color:var(--indigo)}

/* ─── SURVEY GRID ─── */
.surveys-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.2rem}

/* ─── SURVEY CARD ─── */
.s-card{background:var(--white);border:1.5px solid var(--slate-200);border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem;transition:all .2s ease;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.s-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--indigo-200)}
.s-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--indigo),var(--violet));opacity:0;transition:opacity .2s}
.s-card:hover::before{opacity:1}
.s-card-top{padding:1.5rem 1.5rem 1rem;background:linear-gradient(135deg,var(--indigo-l) 0%,transparent 100%)}
.s-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.s-category{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--indigo);background:var(--white);padding:3px 10px;border-radius:999px;border:1px solid var(--indigo-xl)}
.s-responses{font-size:12px;color:var(--slate-400);font-weight:500;display:flex;align-items:center;gap:4px}
.s-title{font-size:17px;font-weight:800;color:var(--slate);line-height:1.35;letter-spacing:-.3px}
.s-card-body{padding:1rem 1.5rem 1.5rem;flex:1;display:flex;flex-direction:column;gap:.8rem}
.s-desc{font-size:13px;color:var(--slate-600);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.s-info-row{display:flex;align-items:center;gap:1rem;padding-top:.8rem;border-top:1px solid var(--slate-100)}
.s-author{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.s-author-av{width:26px;height:26px;border-radius:8px;color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.s-author-name{font-size:13px;font-weight:600;color:var(--slate-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-time{font-size:11px;color:var(--slate-400);font-weight:500;white-space:nowrap}
.s-card-footer{padding:0 1.5rem 1.5rem}
.s-btn{width:100%;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;background:var(--indigo);color:white;transition:all .15s;box-shadow:0 2px 6px rgba(79,70,229,.25)}
.s-btn:hover{background:var(--indigo-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.35)}
.s-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ─── SKELETON LOADING ─── */
.skeleton{background:linear-gradient(90deg,var(--slate-100) 25%,var(--slate-50) 50%,var(--slate-100) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--white);border:1.5px solid var(--slate-200);border-radius:var(--radius-lg);overflow:hidden;height:220px}
.skel-top{height:90px;background:var(--slate-100)}
.skel-body{padding:1rem 1.5rem;display:flex;flex-direction:column;gap:10px}
.skel-line{height:12px;border-radius:6px}

/* ─── EMPTY STATE ─── */
.empty-state{grid-column:1/-1;text-align:center;padding:5rem 2rem}
.empty-icon{font-size:56px;margin-bottom:1rem}
.empty-title{font-size:20px;font-weight:700;color:var(--slate);margin-bottom:.5rem}
.empty-desc{font-size:14px;color:var(--slate-600);max-width:360px;margin:0 auto 1.5rem}

/* ─── SURVEY VIEWER MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(10px);z-index:1000;display:none;align-items:center;justify-content:center;padding:1.5rem}
.overlay.open{display:flex}

.viewer{background:var(--white);border-radius:var(--radius-xl);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);position:relative;border:1.5px solid var(--slate-200)}

.viewer-close{position:absolute;right:18px;top:18px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;z-index:5;transition:all .15s}
.viewer-close:hover{background:rgba(255,255,255,.3)}

.viewer-header{padding:1.8rem 2.2rem 1.2rem;background:var(--indigo);position:relative;border-radius:var(--radius-xl) var(--radius-xl) 0 0}
.viewer-badge{display:none}
.viewer-title{font-size:20px;font-weight:700;color:white;margin-bottom:.4rem;line-height:1.3}
.viewer-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6}

/* ─── PROGRESS ─── */
.viewer-progress{padding:0 2.2rem 1.8rem;background:var(--indigo);border-radius:0;border-bottom:none;display:flex;align-items:center;gap:12px;margin-top:-1px}
.progress-track{flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--amber);border-radius:3px;transition:width .4s ease}
.progress-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.9);white-space:nowrap}

.viewer-body{padding:2.2rem;display:flex;flex-direction:column;gap:1.5rem}

.vq-wrap{padding:1.8rem;border:1.5px solid var(--slate-200);border-radius:16px;background:white;box-shadow:var(--shadow-sm);transition:all .2s;position:relative}
.vq-wrap.answered{border-color:var(--indigo);box-shadow:0 0 0 1px var(--indigo)}
.vq-num{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--indigo);margin-bottom:.7rem}
.vq-text{font-size:18px;font-weight:700;color:var(--slate);margin-bottom:1.6rem;line-height:1.45}
.vq-opts{display:flex;flex-direction:column;gap:10px}

.opt-btn{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1.5px solid var(--slate-200);border-radius:12px;background:white;font-family:inherit;font-size:14px;color:var(--slate);font-weight:500;cursor:pointer;text-align:left;width:100%;transition:all .15s}
.opt-btn:hover{border-color:var(--indigo);background:var(--indigo-l)}
.opt-btn.sel{border-color:var(--indigo);background:var(--indigo-l);color:var(--indigo-d)}
.opt-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--slate-300);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.opt-btn.sel .opt-radio{border-color:var(--indigo);background:var(--indigo)}
.opt-btn.sel .opt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:white}

.opt-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--slate-300);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white}
.opt-btn.sel .opt-check{border-color:var(--indigo);background:var(--indigo)}

.text-input{width:100%;padding:14px 18px;border:1.5px solid var(--slate-200);border-radius:12px;font-size:14px;font-family:inherit;color:var(--slate);outline:none;resize:vertical;min-height:90px;transition:border-color .15s;line-height:1.6}
.text-input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.1)}

.rating-row{display:flex;gap:8px}
.rating-btn{width:46px;height:46px;border-radius:10px;border:1.5px solid var(--slate-200);background:var(--white);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--slate-600);transition:all .15s;display:flex;align-items:center;justify-content:center}
.rating-btn:hover{border-color:var(--indigo);background:var(--indigo-l);color:var(--indigo)}
.rating-btn.sel{background:var(--indigo);border-color:var(--indigo);color:white;box-shadow:0 2px 8px rgba(79,70,229,.3)}

.viewer-footer{padding:1.5rem 2.5rem;border-top:1px solid var(--slate-100);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--white)}
.answered-count{font-size:13px;color:var(--slate-400);font-weight:500}
.answered-count strong{color:var(--indigo)}

/* ─── SUCCESS VIEW ─── */
.success-view{padding:3.5rem 2.5rem;text-align:center}
.success-icon-wrap{width:72px;height:72px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:32px;animation:pop .4s cubic-bezier(.36,1.6,.4,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-size:24px;font-weight:800;color:var(--slate);margin-bottom:.5rem;letter-spacing:-.5px}
.success-sub{font-size:15px;color:var(--slate-600);line-height:1.6;max-width:340px;margin:0 auto 1.5rem}

/* ─── SPINNER ─── */
.spinner{width:36px;height:36px;border:3px solid var(--indigo-xl);border-top-color:var(--indigo);border-radius:50%;animation:spin .7s linear infinite;margin:3rem auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── COMMENTS SECTION ─── */
.comments-section{margin-top:1.5rem;padding-top:1.5rem;border-top:1.5px solid var(--slate-200)}
.comments-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.comments-header h3{font-size:16px;font-weight:700;color:var(--slate);display:flex;align-items:center;gap:6px}
.comments-header span{font-size:13px;color:var(--slate-400);font-weight:500}
.comments-list{display:flex;flex-direction:column;gap:.8rem;max-height:300px;overflow-y:auto;padding-right:4px}
.comments-list::-webkit-scrollbar{width:6px}
.comments-list::-webkit-scrollbar-track{background:var(--slate-100);border-radius:3px}
.comments-list::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:3px}
.comment-item{background:var(--slate-50);border:1px solid var(--slate-200);border-radius:10px;padding:1rem;display:flex;gap:.75rem}
.comment-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0}
.comment-content{flex:1}
.comment-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;flex-wrap:wrap}
.comment-author{font-size:14px;font-weight:700;color:var(--slate)}
.comment-time{font-size:12px;color:var(--slate-400)}
.comment-text{font-size:14px;color:var(--slate-600);line-height:1.5}
.comments-loading,.comments-empty{text-align:center;padding:1.5rem;color:var(--slate-400);font-size:14px}
.comment-form{display:flex;gap:.6rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--slate-200)}
.comment-form textarea{flex:1;padding:10px 12px;border:1.5px solid var(--slate-200);border-radius:10px;font-size:14px;font-family:inherit;resize:none;outline:none;transition:all .15s;background:var(--slate-50)}
.comment-form textarea:focus{border-color:var(--indigo);background:white;box-shadow:0 0 0 3px rgba(79,70,229,.1)}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;max-width:340px}
.toast.s{background:var(--slate);color:white}
.toast.e{background:var(--rose);color:white}
.toast.show{transform:translateY(0);opacity:1}

/* ─── RESPONSIVE ─── */
@media(max-width:900px){
  .hero-stats{display:none}
  .hero-inner{flex-direction:column;align-items:flex-start;gap:1rem}
  .filter-tabs{display:none}
}
@media(max-width:640px){
  .nav{padding:0 1.2rem}
  .hero-header,.main-content{padding-left:1.2rem;padding-right:1.2rem}
  .search-section{padding:1rem 1.2rem}
  .surveys-grid{grid-template-columns:1fr}
  .viewer{border-radius:0;max-height:100%;height:100%}
  .overlay{padding:0}
  .viewer-header,.viewer-body,.viewer-footer,.viewer-progress{padding-left:1.5rem;padding-right:1.5rem}
  .rating-row{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav class="nav">
  <a href="index.html" class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <span class="brand-name"><em>Oylar</em></span>
  </a>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-user-chip" id="nav-user-chip">
      <span class="nav-username" id="nav-username">Профиль</span>
    </a>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Шығу</button>
  </div>
</nav>

<!-- ─── HERO HEADER ─── -->
<div class="hero-header">
  <div class="hero-inner">
    <div class="hero-text">
      <div class="hero-label">Барлық сауалнамалар</div>
      <h1 class="hero-title">Пікіріңізді білдіріңіз 🗳️</h1>
      <p class="hero-sub">Қызықты тақырыптарды тауып, жауап беріңіз және қоғамдастыққа қосылыңыз</p>
    </div>
    <div class="hero-stats" id="hero-stats">
      <div class="hstat"><div class="hstat-n" id="hs-surveys">—</div><div class="hstat-l">Сауалнама</div></div>
      <div class="hstat"><div class="hstat-n" id="hs-responses">—</div><div class="hstat-l">Жауап</div></div>
      <div class="hstat"><div class="hstat-n" id="hs-users">—</div><div class="hstat-l">Қолданушы</div></div>
    </div>
  </div>
</div>

<!-- ─── SEARCH + FILTERS ─── -->
<div class="search-section">
  <div class="search-inner">
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="Сауалнама атауы немесе автор бойынша іздеу..." oninput="filterSurveys()">
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">Барлығы</button>
      <button class="filter-tab" data-filter="new" onclick="setFilter('new',this)">🆕 Жаңа</button>
      <button class="filter-tab" data-filter="popular" onclick="setFilter('popular',this)">🔥 Танымал</button>
    </div>
  </div>
</div>

<!-- ─── MAIN ─── -->
<main class="main-content">
  <div class="results-row" id="resultsRow" style="display:none">
    <span class="results-count" id="resultsCount"><strong>0</strong> сауалнама табылды</span>
    <div class="sort-wrap">
      <span>Сұрыптау:</span>
      <select class="sort-select" id="sortSelect" onchange="sortSurveys()">
        <option value="new">Жаңалары алдымен</option>
        <option value="popular">Танымалдары</option>
      </select>
    </div>
  </div>

  <div class="surveys-grid" id="surveyList">
    <!-- skeleton -->
    ${[1,2,3,4,5,6].map(()=>`
    <div class="skel-card">
      <div class="skel-top skeleton"></div>
      <div class="skel-body">
        <div class="skel-line skeleton" style="width:60%"></div>
        <div class="skel-line skeleton" style="width:90%"></div>
        <div class="skel-line skeleton" style="width:75%"></div>
      </div>
    </div>`).join('')}
  </div>
</main>

<!-- ─── SURVEY VIEWER ─── -->
<div class="overlay" id="overlay">
  <div class="viewer" id="viewer">
    <button class="viewer-close" onclick="closeViewer()">✕</button>
    <div id="viewerContent"></div>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>

<script>
// ─── HELPERS ────────────────────────────────────────────
const COLORS = ['#4F46E5','#F59E0B','#10B981','#F43F5E','#0EA5E9','#8B5CF6'];
function colorFor(str) { let h = 0; for (const c of (str||'')) h = (h * 31 + c.charCodeAt(0)) % COLORS.length; return COLORS[h]; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escVal(s) { return String(s||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

// ─── AUTH ───────────────────────────────────────────────
const TOKEN = localStorage.getItem('token');
const USER  = (() => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } })();

if (!TOKEN || !USER) { window.location.href = 'login.html'; }

// Nav user
document.getElementById('nav-username').textContent = USER?.name || 'Профиль';

function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

// ─── API ────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TOKEN,
      ...(opts.headers || {})
    }
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || data.error || 'Қате орын алды');
  return data.data ?? data;
}

// ─── STATE ──────────────────────────────────────────────
let allSurveys = [];
let filteredSurveys = [];
let currentFilter = 'all';
let currentSurvey = null;
let answers = {};

// ─── LOAD SURVEYS ───────────────────────────────────────
async function loadSurveys() {
  try {
    const [surveys, stats] = await Promise.allSettled([
      api('/surveys'),
      api('/surveys/stats')
    ]);

    if (surveys.status === 'fulfilled') {
      allSurveys = Array.isArray(surveys.value) ? surveys.value : [];
      filterSurveys();
    } else {
      showEmpty('Сауалнамаларды жүктеу мүмкін болмады 😔', 'Сервер байланысын тексеріңіз');
    }

    if (stats.status === 'fulfilled') {
      const s = stats.value;
      if (s.surveys)   document.getElementById('hs-surveys').textContent   = s.surveys + '+';
      if (s.responses) document.getElementById('hs-responses').textContent = s.responses + '+';
      if (s.users)     document.getElementById('hs-users').textContent     = s.users + '+';
    }
  } catch (e) {
    showEmpty('Қате орын алды', e.message);
  }
}

// ─── FILTER ─────────────────────────────────────────────
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterSurveys();
}

function filterSurveys() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();

  filteredSurveys = allSurveys.filter(s => {
    const matchQ = !q || s.title.toLowerCase().includes(q) || (s.author_name || '').toLowerCase().includes(q);
    return matchQ;
  });

  if (currentFilter === 'popular') {
    filteredSurveys = [...filteredSurveys].sort((a,b) => (b.response_count||0) - (a.response_count||0));
  } else if (currentFilter === 'new') {
    filteredSurveys = [...filteredSurveys].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }

  renderSurveys(filteredSurveys);
}

function sortSurveys() {
  const val = document.getElementById('sortSelect').value;
  if (val === 'popular') {
    filteredSurveys.sort((a,b) => (b.response_count||0) - (a.response_count||0));
  } else {
    filteredSurveys.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }
  renderSurveys(filteredSurveys);
}

// ─── RENDER SURVEYS ─────────────────────────────────────
function renderSurveys(list) {
  const el = document.getElementById('surveyList');
  const row = document.getElementById('resultsRow');
  const count = document.getElementById('resultsCount');

  row.style.display = 'flex';
  count.innerHTML = `<strong>${list.length}</strong> сауалнама табылды`;

  if (!list.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Ештеңе табылмады</div>
        <div class="empty-desc">Іздеу сөзін өзгертіп көріңіз</div>
      </div>`;
    return;
  }

  el.innerHTML = list.map(s => {
    const ago = timeAgo(s.created_at);
    const count = s.response_count || 0;
    const coverHTML = s.imageUrl ? `<img src="${s.imageUrl}" style="width:100%;height:160px;object-fit:cover;border-radius:16px 16px 0 0;flex-shrink:0" alt="Cover">` : '';
    return `
      <div class="s-card">
        ${coverHTML}
        <div class="s-card-top">
          <div class="s-meta">
            <span class="s-category">${esc(s.category || 'Сауалнама')}</span>
            <span class="s-responses">👥 ${count} жауап</span>
          </div>
          <div class="s-title">${esc(s.title)}</div>
        </div>
        <div class="s-card-body">
          <div class="s-desc">${esc(s.description || 'Сипаттама жоқ')}</div>
          <div class="s-info-row">
            <div class="s-author" style="gap:8px">
              <span class="s-author-name">👤 ${esc(s.author_name || 'Аноним')}</span>
            </div>
            <span class="s-time">${ago}</span>
          </div>
        </div>
        <div class="s-card-footer">
          <button class="s-btn" onclick="openSurvey('${s.id}')">Жауап беру →</button>
        </div>
      </div>`;
  }).join('');
}

function showEmpty(title, desc) {
  document.getElementById('surveyList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">😔</div>
      <div class="empty-title">${title}</div>
      <div class="empty-desc">${desc}</div>
    </div>`;
}

// ─── OPEN SURVEY ────────────────────────────────────────
async function openSurvey(id) {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('viewerContent');

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  answers = {};
  content.innerHTML = '<div class="spinner"></div>';

  try {
    currentSurvey = await api('/surveys/' + id);
    renderViewer();
  } catch (e) {
    content.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--slate-600)">Қате: ${e.message}</div>`;
  }
}

function closeViewer() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentSurvey = null;
  answers = {};
}

// ─── RENDER VIEWER ──────────────────────────────────────
function renderViewer() {
  const s = currentSurvey;
  const questions = Array.isArray(s.questions) ? s.questions : (s.questions ? JSON.parse(s.questions) : []);
  const answeredCount = Object.keys(answers).length;
  const total = questions.length;
  const pct = total ? Math.round((answeredCount / total) * 100) : 0;

  const coverHTML = s.imageUrl ? `<img src="${s.imageUrl}" style="width:100%;height:180px;object-fit:cover;flex-shrink:0" alt="Cover">` : '';
  let html = `
    ${coverHTML}
    <div class="viewer-header" ${s.imageUrl ? 'style="border-radius:0"' : ''}>
      <div class="viewer-badge">🗳️ Сауалнама</div>
      <div class="viewer-title">${esc(s.title)}</div>
      ${s.description ? `<div class="viewer-desc">${esc(s.description)}</div>` : ''}
    </div>
    <div class="viewer-progress">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${answeredCount}/${total}</span>
    </div>
    <div class="viewer-body">
      ${questions.map((q, i) => renderQuestion(q, i)).join('')}
    </div>
    <div class="viewer-footer">
      <span class="answered-count">Жауапталды: <strong>${answeredCount}/${total}</strong></span>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost btn-sm" onclick="closeViewer()">Болдырмау</button>
        <button class="btn btn-primary btn-sm" id="submitBtn" onclick="submitSurvey()">Жіберу ✓</button>
      </div>
    </div>
    <div class="comments-section" id="commentsSection">
      <div class="comments-header">
        <h3>💬 Пікірлер</h3>
        <span id="commentsCount">0 пікір</span>
      </div>
      <div class="comments-list" id="commentsList">
        <div class="comments-loading">Жүктелуде...</div>
      </div>
      <div class="comment-form">
        <textarea id="commentInput" placeholder="Пікіріңізді жазыңыз..." rows="2"></textarea>
        <button class="btn btn-primary btn-sm" onclick="submitComment()">Жіберу</button>
      </div>
    </div>`;

  document.getElementById('viewerContent').innerHTML = html;
  
  // Load comments after rendering
  loadComments(s.id);
}

function renderQuestion(q, i) {
  const isAnswered = answers[i] !== undefined && answers[i] !== '';
  const type = q.type || 'radio';
  let inputHTML = '';

  if (['radio', 'single', 'dropdown'].includes(type)) {
    inputHTML = `<div class="vq-opts">${(q.options||[]).map((opt,j) => {
      const sel = answers[i] === opt;
      return `<button class="opt-btn ${sel?'sel':''}" onclick="setAnswer(${i},'${escVal(opt)}','radio')">
        <div class="opt-radio"></div><span>${esc(opt)}</span>
      </button>`;
    }).join('')}</div>`;
  } else if (type === 'checkbox' || type === 'multiple') {
    inputHTML = `<div class="vq-opts">${(q.options||[]).map((opt,j) => {
      const arr = Array.isArray(answers[i]) ? answers[i] : [];
      const sel = arr.includes(opt);
      return `<button class="opt-btn ${sel?'sel':''}" onclick="setAnswer(${i},'${escVal(opt)}','checkbox')">
        <div class="opt-check">${sel?'✓':''}</div><span>${esc(opt)}</span>
      </button>`;
    }).join('')}</div>`;
  } else if (type === 'text') {
    inputHTML = `<textarea class="text-input" placeholder="Жауабыңызды жазыңыз..." oninput="setAnswer(${i},this.value,'text')">${esc(answers[i]||'')}</textarea>`;
  } else if (type === 'rating' || type === 'scale') {
    inputHTML = `<div class="rating-row">${[1,2,3,4,5].map(n => `
      <button class="rating-btn ${answers[i]==n?'sel':''}" onclick="setAnswer(${i},${n},'radio')">${n}</button>
    `).join('')}</div>`;
  } else {
    inputHTML = `<input class="text-input" type="text" style="min-height:auto;padding:12px 14px" oninput="setAnswer(${i},this.value,'text')" value="${esc(answers[i]||'')}">`;
  }

  return `
    <div class="vq-wrap ${isAnswered?'answered':''}" id="vq-${i}">
      <div class="vq-num">Сұрақ ${i+1}</div>
      <div class="vq-text">${esc(q.text)}</div>
      ${inputHTML}
    </div>`;
}

function setAnswer(i, val, type) {
  // Save scroll position before re-rendering
  const viewerBody = document.querySelector('.viewer-body');
  const scrollPos = viewerBody ? viewerBody.scrollTop : 0;
  
  if (type === 'checkbox') {
    if (!Array.isArray(answers[i])) answers[i] = [];
    const idx = answers[i].indexOf(val);
    if (idx > -1) answers[i].splice(idx, 1);
    else answers[i].push(val);
  } else {
    answers[i] = val;
  }
  
  renderViewer();
  
  // Restore scroll position after re-rendering
  setTimeout(() => {
    const newViewerBody = document.querySelector('.viewer-body');
    if (newViewerBody) newViewerBody.scrollTop = scrollPos;
  }, 0);
}

// ─── SUBMIT ─────────────────────────────────────────────
async function submitSurvey() {
  const btn = document.getElementById('submitBtn');
  if (!btn) return;

  const questions = Array.isArray(currentSurvey.questions)
    ? currentSurvey.questions
    : JSON.parse(currentSurvey.questions || '[]');

  // Check all answered
  const unanswered = questions.findIndex((q, i) => answers[i] === undefined || answers[i] === '' || (Array.isArray(answers[i]) && !answers[i].length));
  if (unanswered !== -1) {
    const el = document.getElementById('vq-' + unanswered);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    showToast('Барлық сұрақтарға жауап беріңіз', 'e');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div style="width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite"></div>';

  const formattedAnswers = Object.entries(answers).map(([idx, answer]) => ({
    questionIndex: parseInt(idx),
    answer
  }));

  try {
    await api('/responses', {
      method: 'POST',
      body: JSON.stringify({ surveyId: currentSurvey.id, answers: formattedAnswers })
    });

    // Update local count
    const s = allSurveys.find(x => x.id == currentSurvey.id);
    if (s) s.response_count = (s.response_count || 0) + 1;

    showSuccessView();
    setTimeout(() => { closeViewer(); filterSurveys(); }, 2500);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Жіберу ✓';
    showToast(e.message || 'Жіберу мүмкін болмады', 'e');
  }
}

function showSuccessView() {
  document.getElementById('viewerContent').innerHTML = `
    <div class="success-view">
      <div class="success-icon-wrap">✅</div>
      <div class="success-title">Рахмет!</div>
      <div class="success-sub">Жауабыңыз сәтті жіберілді. Сіздің пікіріңіз маңызды!</div>
      <button class="btn btn-primary" onclick="closeViewer()">Жабу</button>
    </div>`;
}

// ─── DATE HELPERS ───────────────────────────────────────

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'Жаңа ғана';
  if (min < 60) return `${min} мин бұрын`;
  const h = Math.floor(min / 60);
  if (h < 24) return `${h} сағат бұрын`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d} күн бұрын`;
  return new Date(dateStr).toLocaleDateString('kk-KZ');
}

function showToast(msg, type = 's') {
  const t = document.getElementById('toast');
  t.textContent = (type === 's' ? '✅ ' : '⚠️ ') + msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── CLOSE ON OVERLAY CLICK ─────────────────────────────
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target.id === 'overlay') closeViewer();
});

// ─── COMMENTS FUNCTIONS ─────────────────────────────────
async function loadComments(surveyId) {
  try {
    const comments = await api('/comments/' + surveyId);
    renderComments(comments || []);
  } catch (e) {
    console.error('Comments load error:', e);
    renderComments([]);
  }
}

function renderComments(comments) {
  const list = document.getElementById('commentsList');
  const count = document.getElementById('commentsCount');
  
  if (!list || !count) return;
  
  count.textContent = comments.length + ' пікір';
  
  if (!comments.length) {
    list.innerHTML = '<div class="comments-empty">Әзірге пікірлер жоқ. Бірінші болыңыз! 💬</div>';
    return;
  }
  
  list.innerHTML = comments.map(c => {
    const ago = timeAgo(c.createdAt);
    const nameStr = c.author_name || 'Аноним';
    const init = nameStr.slice(0, 2).toUpperCase();
    const color = colorFor(nameStr);
    return `
      <div class="comment-item">
        <div style="width:36px;height:36px;border-radius:50%;background:${color};color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0">${init}</div>
        <div class="comment-content">
          <div class="comment-header">
            <span class="comment-author">${esc(nameStr)}</span>
            <span class="comment-time">${ago}</span>
          </div>
          <div class="comment-text">${esc(c.text)}</div>
        </div>
      </div>`;
  }).join('');
}

async function submitComment() {
  const input = document.getElementById('commentInput');
  const text = input?.value?.trim();
  
  if (!text) {
    showToast('Пікір мәтінін жазыңыз', 'e');
    return;
  }
  
  if (!currentSurvey) {
    showToast('Сауалнама табылмады', 'e');
    return;
  }
  
  try {
    const btn = document.querySelector('.comment-form .btn');
    if (btn) btn.disabled = true;
    
    await api('/comments', {
      method: 'POST',
      body: JSON.stringify({ surveyId: currentSurvey.id, text: text })
    });
    
    input.value = '';
    showToast('Пікіріңіз қосылды!', 's');
    
    // Reload comments
    loadComments(currentSurvey.id);
  } catch (e) {
    showToast(e.message || 'Пікір жіберу мүмкін болмады', 'e');
  } finally {
    const btn = document.querySelector('.comment-form .btn');
    if (btn) btn.disabled = false;
  }
}

// ─── INIT ───────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const sharedSurveyId = urlParams.get('survey');

if (sharedSurveyId) {
  openSurvey(sharedSurveyId);
} 
loadSurveys();
</script>
</body>
</html>
